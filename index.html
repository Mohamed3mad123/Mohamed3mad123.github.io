<style>
:root{
--dark:#0f172a;
--blue:#1e3a8a;
--light:#ffffff;
--gray:#64748b;
}

/* BODY */
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#ffffff;
color:var(--dark);
}

/* HEADER */
header{
background:white;
border-bottom:1px solid #e2e8f0;
position:sticky;
top:0;
z-index:1000;
}
nav{
width:90%;
margin:auto;
display:flex;
justify-content:space-between;
padding:15px 0;
}

/* HERO (Dark Premium Section) */
.hero{
background:var(--dark);
color:white;
display:flex;
align-items:center;
justify-content:center;
gap:40px;
padding:100px 20px;
flex-wrap:wrap;
}
.hero img{
width:140px;
height:140px;
border-radius:50%;
border:3px solid #1e3a8a;
}
.hero h1{
font-size:42px;
margin:0;
}
.hero p{
color:#cbd5f5;
}

/* SECTIONS */
.section{
width:90%;
max-width:1100px;
margin:auto;
padding:70px 0;
}

/* SKILLS */
.skill-card{
background:#ffffff;
border:1px solid #e2e8f0;
padding:20px;
border-radius:15px;
transition:0.3s;
}
.skill-card:hover{
transform:translateY(-5px);
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}
.skill-card h3{
color:var(--blue);
}

/* PROJECTS */
.project-card{
background:white;
border:1px solid #e2e8f0;
border-radius:20px;
overflow:hidden;
transition:0.3s;
}
.project-card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,0.08);
}
.project-card img{
width:100%;
height:200px;
object-fit:cover;
}
.project-details{
padding:20px;
}

/* BUTTON */
.btn{
background:var(--blue);
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}
.btn:hover{
background:#2563eb;
}

/* CONTACT */
.contact{
background:var(--dark);
color:white;
text-align:center;
padding:80px 20px;
}
.contact a{
color:#cbd5f5;
display:block;
margin:10px;
text-decoration:none;
}
.contact a:hover{
color:white;
}

/* MODAL */
.modal-content{
background:white;
border-radius:20px;
padding:30px;
}

/* SCROLL ANIMATION SMOOTH */
html{
scroll-behavior:smooth;
}
</style>
